<section class="page-card">
  <p class="eyebrow">Únete hoy</p>
  <h2>Crear tu cuenta</h2>
  <p>Regístrate y empieza a formar parte de la comunidad.</p>

  <form class="stack" [formGroup]="registerForm" (ngSubmit)="register()">
    <label class="field">
      <span>Nombre completo</span>
      <input type="text" formControlName="fullName" autocomplete="name" placeholder="Tu nombre completo" />
    </label>

    <label class="field">
      <span>Correo electrónico</span>
      <input type="email" formControlName="email" autocomplete="email" placeholder="tu@ejemplo.com" />
    </label>

    <label class="field">
      <span>Contraseña</span>
      <input type="password" formControlName="password" autocomplete="new-password" placeholder="Crea una contraseña" />
    </label>

    @if (errorMessage(); as message) {
      <p class="feedback error" role="alert">{{ message }}</p>
    }

    @if (successMessage(); as message) {
      <p class="feedback success">{{ message }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Creando...' : 'Registrarse' }}
    </button>

    <a routerLink="/login">Volver a iniciar sesión</a>
  </form>
</section>
