<div class="post-social-actions" [class.detail-actions]="detail()">
  <button
    type="button"
    class="social-btn comment-btn"
    [class.active]="commentsOpen()"
    (click)="stopAndRequestComment($event)"
    [title]="detail() ? 'Responder' : 'Comentar'"
  >
    <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
    </svg>
    @if (showCounts()) {
      <span class="social-count">{{ repliesCount() }}</span>
    }
  </button>

  <div class="retweet-btn-wrapper" (click)="$event.stopPropagation()">
    <button
      type="button"
      class="social-btn retweet-btn"
      [class.active]="retweeted()"
      (click)="requestRetweetMenu($event)"
      title="Compartir"
    >
      <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="17 1 21 5 17 9" />
        <path d="M3 11V9a4 4 0 0 1 4-4h14" />
        <polyline points="7 23 3 19 7 15" />
        <path d="M21 13v2a4 4 0 0 1-4 4H3" />
      </svg>
      @if (showCounts()) {
        <span class="social-count">{{ retweetsCount() }}</span>
      }
    </button>

    @if (retweetMenuOpen()) {
      <div class="retweet-dropdown-menu" (click)="$event.stopPropagation()">
        @if (retweeted()) {
          <button type="button" class="dropdown-item danger-item" (click)="stopAndRequestDirectRetweet($event)">
            <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9" /><path d="M3 11V9a4 4 0 0 1 4-4h14" /><polyline points="7 23 3 19 7 15" /><path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
            <span>Quitar</span>
          </button>
        } @else {
          <button type="button" class="dropdown-item" (click)="stopAndRequestDirectRetweet($event)">
            <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9" /><path d="M3 11V9a4 4 0 0 1 4-4h14" /><polyline points="7 23 3 19 7 15" /><path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
            <span>Compartir</span>
          </button>
        }
        <button type="button" class="dropdown-item" (click)="stopAndRequestQuote($event)">
          <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          <span>Citar</span>
        </button>
      </div>
    }
  </div>

  <button
    type="button"
    class="social-btn like-btn"
    [class.active]="liked()"
    (click)="stopAndRequestLike($event)"
    title="Me gusta"
  >
    <svg class="social-icon" viewBox="0 0 24 24" [attr.fill]="liked() ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
    </svg>
    @if (showCounts()) {
      <span class="social-count">{{ likesCount() }}</span>
    }
  </button>

  @if (showCounts()) {
    <div class="social-btn view-btn" title="Vistas" (click)="$event.stopPropagation()">
      <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <span class="social-count">{{ viewCount() }}</span>
    </div>
  }
</div>
